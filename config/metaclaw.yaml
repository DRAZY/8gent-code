# MetaClaw configuration for 8gent Code
# See docs/KERNEL-FINETUNING.md for architecture details
#
# Install: pip install -e ".[rl,evolve,scheduler]"
# Start:   metaclaw start
# Status:  metaclaw status

mode: madmax  # madmax | rl | skills_only

llm:
  provider: custom
  model_id: qwen3:14b                 # Qwen3 14B — strongest coding benchmarks, fits M2 Max
  api_base: http://localhost:11434/v1  # Ollama OpenAI-compat endpoint
  api_key: ""                          # Ollama needs no key

proxy:
  port: 30000
  api_key: ""  # No auth for local proxy

skills:
  enabled: true
  dir: ~/.metaclaw/skills
  retrieval_mode: template
  top_k: 6
  auto_evolve: true

rl:
  enabled: true
  backend: mint           # Local MinT backend — no cloud dependency
  model: qwen3:14b
  api_key: ""
  base_url: ""            # Set to MinT endpoint when running
  # Judge model: Gemini Flash via OpenRouter (free)
  prm_url: https://openrouter.ai/api/v1
  prm_model: google/gemini-2.5-flash:free
  prm_api_key: "${OPENROUTER_API_KEY}"
  lora_rank: 32
  batch_size: 4
  resume_from_ckpt: ""

opd:
  enabled: false  # Enable later for teacher distillation
  teacher_url: ""
  teacher_model: ""
  kl_penalty_coef: 1.0

scheduler:
  enabled: true  # MadMax mode defers training to idle windows
  sleep_start: "23:00"
  sleep_end: "07:00"
  idle_threshold_minutes: 30
  calendar:
    enabled: false
    credentials_path: ""
