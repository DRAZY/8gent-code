<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frosted Glass Cards</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Vibrant Multi-Color Gradient Background */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* Animated Background Gradient */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Background Blobs/Shapes */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.8;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: #ff9a9e;
            animation: float 6s ease-in-out infinite;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: #a18cd1;
            animation: float 8s ease-in-out infinite reverse;
        }

        .blob-3 {
            top: 40%;
            left: 40%;
            width: 30vw;
            height: 30vw;
            background: #fbc2eb;
            animation: float 7s ease-in-out infinite 1s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
            100% { transform: translate(0, 0); }
        }

        /* Container for cards */
        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Card Class */
        .glass-card {
            position: absolute;
            width: 300px;
            padding: 2rem;
            border-radius: 16px; /* >= 12px */
            background: rgba(255, 255, 255, 0.15); /* Alpha < 0.5 */
            backdrop-filter: blur(15px); /* >= 10px */
            -webkit-backdrop-filter: blur(15px); /* Safari support */
            border: 1px solid rgba(255, 255, 255, 0.3); /* Subtle light border */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            color: white;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.2);
        }

        .glass-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .glass-card p {
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.9;
            margin-bottom: 1rem;
        }

        .glass-card .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        /* Positioning the cards to overlap */
        .card-1 {
            z-index: 3;
            top: 40%;
            left: 40%;
            transform: translate(-50%, -50%);
        }

        .card-2 {
            z-index: 2;
            top: 30%;
            left: 20%;
            transform: translate(-50%, -50%);
        }

        .card-3 {
            z-index: 1;
            top: 60%;
            left: 70%;
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>

    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Card Container -->
    <div class="card-container">

        <!-- Card 1 (Center) -->
        <div class="glass-card card-1">
            <span class="icon">🚀</span>
            <h2>Launch</h2>
            <p>Experience the thrill of speed and innovation with our latest updates.</p>
        </div>

        <!-- Card 2 (Top Left) -->
        <div class="glass-card card-2">
            <span class="icon">🎨</span>
            <h2>Design</h2>
            <p>Crafting beautiful interfaces with modern glassmorphism techniques.</p>
        </div>

        <!-- Card 3 (Bottom Right) -->
        <div class="glass-card card-3">
            <span class="icon">🔒</span>
            <h2>Security</h2>
            <p>Your data is protected with enterprise-grade encryption standards.</p>
        </div>

    </div>

</body>
</html>
